<!DOCTYPE html>
<html lang="ko">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <title>SK가스 사업 지식베이스</title>
  <style>
    :root { --theme-color: #0066cc; }
    .cover-main h1 { font-size: 2.5rem; }
    /* h2 하단 밑줄 제거 (Docsify Vue 기본 스타일 override) */
    .markdown-section h2 { border-bottom: none; padding-bottom: 0.2em; }
    /* hr 구분선 스타일 정리 */
    .markdown-section hr { border: none; border-top: 1px solid #eee; margin: 1.5em 0; }
  </style>
</head>
<body>
  <div id="app">불러오는 중...</div>
  <script src="//cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    window.$docsify = {
      name: 'SK가스 사업 지식베이스',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      executeScript: true,
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음',
        depth: 3,
      },
      auto2top: true,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
